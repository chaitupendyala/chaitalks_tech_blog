baseURL = 'https://chaitalks.tech/'
languageCode = 'en-us'
title = 'ChaiTalks.Tech'
theme = 'PaperMod'

[outputs]
home = ["HTML", "RSS", "JSON"]

[params]
env = 'production'
author = 'Chai'
description = 'ChaiTalks.Tech — Chai writes about AI, software, and interesting things he is building.'
keywords = ['AI', 'software', 'technology', 'MCP', 'LLM', 'developer', 'blog']
ShowReadingTime = true
ShowShareButtons = false
ShowPostNavLinks = true
comments = false

[params.schema]
publisherType = 'Person'

[params.label]
  icon = "logo.png"
  iconHeight = 80

[params.homeInfoParams]
  Title = "Hi, I'm Chai 👋"
  Content = """
ChaiTalks.Tech is a place where I talk about interesting things I come across or am currently building.
I hope you find these as interesting as I do.

Find me online:
"""

[[params.socialIcons]]
  name = "github"
  url = "https://github.com/chaitupendyala"

[[params.socialIcons]]
  name = "linkedin"
  url = "https://www.linkedin.com/in/phani-chaitanya-pendyala-88327bba"

[[params.socialIcons]]
  name = "x"
  url = "https://x.com/ChaiTalksTech"

[[params.socialIcons]]
  name = "rss"
  url = "/index.xml"

[[menus.main]]
  name = "Apps"
  url = "/apps/"
  weight = 2

