{{- define "main" }}

<header class="page-header">
    <h1>{{- (printf "%s&nbsp;" .Title ) | htmlUnescape -}}
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
    </h1>
</header>

<div id="searchbox">
    <input id="searchInput" autofocus placeholder="{{ .Params.placeholder | default (printf "%s ↵" .Title) }}"
        aria-label="search" type="search" autocomplete="off" maxlength="64">
    <ul id="searchResults" aria-label="search results"></ul>
</div>

<script>
// Read query param and pre-fill the search input, then trigger search
// fastsearch.js uses window.onload to init fuse, so we poll via keyup events
window.addEventListener('load', function() {
    var params = new URLSearchParams(window.location.search);
    var query = params.get('q');
    if (query) {
        var input = document.getElementById('searchInput');
        if (input) {
            input.value = query;
            // Small delay to let fastsearch.js finish XHR init
            var attempts = 0;
            var trySearch = setInterval(function() {
                input.dispatchEvent(new KeyboardEvent('keyup', { key: 'a' }));
                attempts++;
                var results = document.getElementById('searchResults');
                if ((results && results.children.length > 0) || attempts > 40) {
                    clearInterval(trySearch);
                }
            }, 100);
        }
    }
});
</script>

{{- end }}{{/* end main */}}
