{{- /* Giscus comments — powered by GitHub Discussions */ -}}
{{- /* To activate: create a public GitHub repo, enable Discussions, install the Giscus app, */ -}}
{{- /* then replace the placeholder values below with your repo details from https://giscus.app */ -}}
<div class="giscus-container">
  <script>
    (function() {
      var theme = document.body.classList.contains('dark') ? 'dark' : 'light';
      var s = document.createElement('script');
      s.src = 'https://giscus.app/client.js';
      s.setAttribute('data-repo', 'chaitupendyala/chaitalks_tech_blog');
      s.setAttribute('data-repo-id', 'R_kgDORdy7mg');
      s.setAttribute('data-category', 'Blog Comments');
      s.setAttribute('data-category-id', 'DIC_kwDORdy7ms4C44-E');
      s.setAttribute('data-mapping', 'pathname');
      s.setAttribute('data-strict', '0');
      s.setAttribute('data-reactions-enabled', '1');
      s.setAttribute('data-emit-metadata', '0');
      s.setAttribute('data-input-position', 'top');
      s.setAttribute('data-theme', theme);
      s.setAttribute('data-lang', 'en');
      s.setAttribute('data-loading', 'lazy');
      s.setAttribute('crossorigin', 'anonymous');
      s.async = true;
      document.currentScript.parentElement.appendChild(s);

      // Update Giscus theme when PaperMod theme is toggled
      var toggle = document.getElementById('theme-toggle');
      if (toggle) {
        toggle.addEventListener('click', function() {
          var isDark = document.body.classList.contains('dark');
          var frame = document.querySelector('iframe.giscus-frame');
          if (frame) {
            frame.contentWindow.postMessage(
              { giscus: { setConfig: { theme: isDark ? 'dark' : 'light' } } },
              'https://giscus.app'
            );
          }
        });
      }
    })();
  </script>
</div>
