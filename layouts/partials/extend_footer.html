{{- /* Newsletter signup + RSS promotion */ -}}
<div class="newsletter-box">
  <h3>Stay in the loop</h3>
  <p>Get a weekly tech digest and new posts delivered to your inbox. No spam, unsubscribe anytime.</p>
  <div class="newsletter-rss">
    Or subscribe via <a href="/index.xml" target="_blank">RSS feed</a>
  </div>
</div>

{{- /* Notification service worker — bell icon is in header.html */ -}}
<script>
(function() {
  if (!('serviceWorker' in navigator) || !('Notification' in window)) return;

  var bell = document.getElementById('notify-bell');
  if (!bell) return;

  function updateUI() {
    if (Notification.permission === 'granted') {
      bell.classList.add('notify-active');
      bell.title = 'Notifications enabled';
      bell.style.display = '';
    } else if (Notification.permission === 'denied') {
      bell.style.display = 'none';
    } else {
      bell.style.display = '';
    }
  }

  updateUI();

  bell.addEventListener('click', function() {
    if (Notification.permission === 'granted') return;
    Notification.requestPermission().then(function(permission) {
      if (permission === 'granted') {
        navigator.serviceWorker.register('/sw-notify.js').then(function(reg) {
          updateUI();
          if (reg.active) {
            reg.active.postMessage({ type: 'CHECK_NEW_CONTENT' });
          } else {
            navigator.serviceWorker.ready.then(function(r) {
              r.active.postMessage({ type: 'CHECK_NEW_CONTENT' });
            });
          }
        });
      }
      updateUI();
    });
  });

  // If already granted, register SW and check periodically
  if (Notification.permission === 'granted') {
    navigator.serviceWorker.register('/sw-notify.js').then(function() {
      navigator.serviceWorker.ready.then(function(reg) {
        reg.active.postMessage({ type: 'CHECK_NEW_CONTENT' });
        setInterval(function() {
          reg.active.postMessage({ type: 'CHECK_NEW_CONTENT' });
        }, 60 * 60 * 1000);
      });
    });
  }
})();
</script>
